version: '3.3'
services:
  alist:
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - '/etc/alist:/opt/alist/data'
    ports:
      - '5244:5244'
      - '5245:5245'
    environment:
      - PUID=0
      - PGID=0
      - UMASK=022
      - TZ=UTC
    container_name: alist
    image: 'alist-local:latest'
